    <div class="container">
        <div class="row justify-content-center">
            <div class="col-lg-6">
                <div class="card p-4 shadow">
                    <h2 class="text-center mb-4">Fare Ride</h2>

                    <h5 class="fw-bold">PICK-UP LOCATION: </h5>
                    <select class="form-control mb-3" id="service"> 
                        <option value="0">Choose location...</option>
                        <option value="1">Quezon Avenue</option>
                        <option value="1.2">GMA Kamuning</option>
                        <option value="2.8">Araneta Center-Cubao</option>
                        <option value="4.5">Santolan-Annapolis</option>
                        <option value="6.2">Ortigas</option>
                        <option value="7.8">Shaw Boulevard</option>
                        <option value="9.1">Boni Avenue</option>
                        <option value="10.5">Guadalupe</option>
                        <option value="12.0">Buendia</option>
                        <option value="13.4">Ayala</option>
                        <option value="14.8">Magallanes</option>
                        <option value="16.2">Taft Avenue</option>
                    </select>

                    <h5 class="fw-bold">DROP-OFF LOCATION</h5>
                    <select class="form-control mb-3" id="distance"> 
                        <option value="0">Choose location...</option>
                        <option value="1">Quezon Avenue</option>
                        <option value="1.2">GMA Kamuning</option>
                        <option value="2.8">Araneta Center-Cubao</option>
                        <option value="4.5">Santolan-Annapolis</option>
                        <option value="6.2">Ortigas</option>
                        <option value="7.8">Shaw Boulevard</option>
                        <option value="9.1">Boni Avenue</option>
                        <option value="10.5">Guadalupe</option>
                        <option value="12.0">Buendia</option>
                        <option value="13.4">Ayala</option>
                        <option value="14.8">Magallanes</option>
                        <option value="16.2">Taft Avenue</option>
                    </select>
                    
                    <label for="yes" style="text-align: ;"> 
                        <input type="checkbox" id="yes" name="yes" value="Yes"> 
                        Apply 20% Discount for Students/PWD/Elderly
                        </label>
                       
                    <br> 

                    <button class="btn btn-red w-100" onclick="computeTotal()">Compute Fare</button>

                    <p class="mt-3 fw-bold" id="result"></p>

                </div>
            </div>
        </div>
    </div>


<script>
    const basefare = 50;   
    const perKMrate = 15;  
    const baseKM = 2;      

    function computeTotal() {

        let pickup = parseFloat(document.getElementById("service").value);
        let dropoff = parseFloat(document.getElementById("distance").value);
        let discountChecked = document.getElementById("yes").checked;

        if (pickup === 0 || dropoff === 0) {
            document.getElementById("result").innerHTML = 
                "Please select both locations.";
            return;
        }

        let totalDistance = Math.abs(dropoff - pickup);
        let totalFare;

        if (totalDistance <= baseKM) {
            totalFare = basefare;
        } else {
            let extraKM = totalDistance - baseKM;
            totalFare = basefare + (extraKM * perKMrate);
        }

        if (discountChecked) {
            totalFare = totalFare * 0.80;
        }

        document.getElementById("result").innerHTML =
            "Total Fare: ₱" + totalFare.toFixed(2);
    }
</script>
